name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Lint repository
        run: npm run lint

  server:
    name: Server SQL + Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: krytz_test
          POSTGRES_PASSWORD: krytz_test_pass
          POSTGRES_DB: krytz_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U krytz_test -d krytz_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Apply raw SQL boot migrations
        env:
          PGPASSWORD: krytz_test_pass
        run: |
          for file in \
            server/prisma/schema.foundation.sql \
            server/prisma/refresh_tokens.v3.sql \
            server/prisma/schema.v3.sql \
            server/prisma/schema.categories.sql \
            server/prisma/schema.missing.sql \
            server/prisma/schema.phases.sql \
            server/prisma/platform.schema.sql; do
            psql -h localhost -U krytz_test -d krytz_test -v ON_ERROR_STOP=1 -f "$file"
          done

      - name: Run server unit tests
        working-directory: server
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://krytz_test:krytz_test_pass@localhost:5432/krytz_test?schema=public
          JWT_SECRET: test-jwt-secret
          JWT_REFRESH_SECRET: test-refresh-secret
          OPENAI_API_KEY: sk-test-mock
        run: npm test

  client:
    name: Client Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Build client
        working-directory: client
        run: npm run build
