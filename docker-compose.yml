# Krytz â€” Local Development Stack
# Run: docker-compose up -d
# API will be at: http://localhost:8301

services:
  # â”€â”€â”€ PostgreSQL â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  postgres:
    image: pgvector/pgvector:pg16
    container_name: Krytz2-db
    environment:
      POSTGRES_USER: Krytz
      POSTGRES_PASSWORD: Krytz_dev_password
      POSTGRES_DB: Krytz
    ports:
      - "5544:5432"
    volumes:
      - Krytz2_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U Krytz"]
      interval: 5s
      timeout: 3s
      retries: 5

  db-role-setup:
    image: pgvector/pgvector:pg16
    container_name: Krytz2-db-role-setup
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: Krytz_dev_password
    volumes:
      - ./server/prisma/docker-app-role.sql:/docker-app-role.sql:ro
    command: >
      sh -c "psql -h postgres -U Krytz -d Krytz -v ON_ERROR_STOP=1 -f /docker-app-role.sql"

  # â”€â”€â”€ Redis â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  redis:
    image: redis:7-alpine
    container_name: Krytz2-redis
    ports:
      - "6381:6379"
    volumes:
      - Krytz2_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # â”€â”€â”€ MinIO (S3-compatible file storage) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  minio:
    image: minio/minio:latest
    container_name: Krytz2-storage
    environment:
      MINIO_ROOT_USER: Krytz_access_key
      MINIO_ROOT_PASSWORD: Krytz_secret_key
    ports:
      - "9100:9000"    # API
      - "9191:9001"    # Console
    volumes:
      - Krytz2_minio:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5

  # â”€â”€â”€ Create default bucket on startup â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  minio-init:
    image: minio/mc:latest
    container_name: Krytz2-storage-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set Krytz http://minio:9000 Krytz_access_key Krytz_secret_key;
        mc mb Krytz/Krytz-files --ignore-existing;
        mc anonymous set none Krytz/Krytz-files;
        echo 'Bucket Krytz-files created with anonymous access disabled.';
      "

  # â”€â”€â”€ Krytz API â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  api:
    build:
      context: .
      target: development
    container_name: Krytz2-api
    depends_on:
      db-role-setup:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 8000
      DATABASE_URL: postgresql://krytz_app:krytz_app_dev_password@postgres:5432/Krytz?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-jwt-secret-not-for-production
      JWT_REFRESH_SECRET: dev-refresh-secret-not-for-production
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 30d
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-your-openai-api-key}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: Krytz_access_key
      S3_SECRET_KEY: Krytz_secret_key
      S3_BUCKET: Krytz-files
      S3_REGION: us-east-1
      LOG_LEVEL: debug
    ports:
      - "8301:8000"
    volumes:
      - ./server/src:/app/server/src       # Hot reload
      - ./shared:/app/shared               # Hot reload
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  # â”€â”€â”€ Krytz Extraction Worker â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  worker:
    build:
      context: .
      target: development
    container_name: Krytz2-worker
    depends_on:
      db-role-setup:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://krytz_app:krytz_app_dev_password@postgres:5432/Krytz?schema=public
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-your-openai-api-key}
      LOG_LEVEL: debug
    command: npm run worker
    volumes:
      - ./server/src:/app/server/src
      - ./shared:/app/shared

volumes:
  Krytz2_pgdata:
  Krytz2_redis:
  Krytz2_minio:
