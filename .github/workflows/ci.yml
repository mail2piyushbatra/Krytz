name: Krytz CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-client:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: './client/package-lock.json'
    - run: npm ci
      working-directory: ./client
    - run: npm test -- --run
      working-directory: ./client
    - run: npm run build
      working-directory: ./client

  test-server:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: './server/package-lock.json'
        
    - name: Install server dependencies
      run: npm ci
      working-directory: ./server
      
    - name: Run Unit Tests
      run: node tests/unit/run-tests.cjs
      working-directory: ./server

    - name: Start Docker Environment
      run: docker-compose up -d postgres redis minio minio-init
      
    - name: Wait for Database
      run: |
        echo "Waiting for PostgreSQL..."
        while ! nc -z localhost 5544; do
          sleep 1
        done
        echo "Database is ready!"

    - name: Run Live Integration Tests
      env:
        KRYTZ_RUN_LIVE_API_TESTS: "true"
        DATABASE_URL: "postgresql://Krytz:Krytz_dev_password@localhost:5544/Krytz?schema=public"
        JWT_SECRET: "ci-secret"
        JWT_REFRESH_SECRET: "ci-refresh-secret"
      run: npm run test:live
      working-directory: ./server
